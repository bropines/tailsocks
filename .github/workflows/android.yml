name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип сборки (debug/release/all)'
        required: true
        default: 'release'
        type: choice
        options:
          - 'debug'
          - 'release'
          - 'all'
      skip_signing:
        description: 'Пропустить подпись (только для debug)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: appctr/go.sum

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        if: |
          (github.event_name == 'push' || github.event.inputs.build_type != 'debug') &&
          github.event.inputs.skip_signing != 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build AppCtr Core (Gomobile + Patches)
        run: |
          cd appctr
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          sh build.sh

      - name: Determine Gradle command
        id: gradle_command
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "command=app:assembleRelease" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.inputs.build_type }}" in
              "debug") echo "command=app:assembleDebug" >> "$GITHUB_OUTPUT";;
              "release") echo "command=app:assembleRelease" >> "$GITHUB_OUTPUT";;
              "all") echo "command=app:assembleDebug app:assembleRelease" >> "$GITHUB_OUTPUT";;
              *) echo "command=app:assembleRelease" >> "$GITHUB_OUTPUT";;
            esac
          fi

      - name: Build Android App
        run: |
          chmod +x gradlew
          ./gradlew ${{ steps.gradle_command.outputs.command }} --stacktrace
        env:
          KEYSTORE_FILE: ${{ (github.event.inputs.skip_signing != 'true') && 'release.jks' || 'debug.keystore' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tailscaled-apks
          path: app/build/outputs/apk/**/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*.apk
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"